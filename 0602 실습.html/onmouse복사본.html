<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function over(obj){
            obj.src="image.png"
        }
        function out(obj){
            obj.src="fullapple.png"
        }
    </script>
</head>
<body>
    <h3>마우스를 올려 보세요</h3>
    <hr>
    <img src="image.png" alt="이미지"
         onmouseover="over(this)"
         onmouseout="out(this)">
</body>
</html>
