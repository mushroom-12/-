<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {position:absolute;}
        img {position:absolute;}
        #cat1{z-index:1;left:60px;top:40px;}/*z-index가 가장 낮은게 아래로 깔린다(이미지가중복시 가장 아래로 내려간다*/
        #cat2{z-index:2;left:100px;top:80px;}
        #cat3{z-index:3;left:160px;top:60px;}
        #cat4{z-index:4;left:220px;top:-40px;}
    </style>
</head>

<body>
    <div>
        <img id="cat1" src="https://www.placecats.com/240/320" alt="고양이1">
        <img id="cat2" src="https://www.placecats.com/200/300" alt="고양이2">
        <img id="cat3" src="https://www.placecats.com/300/200" alt="고양이3">
        <img id="cat4" src="https://www.placecats.com/320/200" alt="고양이4">
    </div>
    <br>
</body>

</html>
