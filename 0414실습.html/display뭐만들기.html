<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            border: 2px solid yellowgreen;
            color: aqua;
            background: pink;
        }

        span {
            border: 5px dotted red;
            background: black;
        }
    </style>
</head>

<body>
    <h3>none, inline, inline-block,bolck</h3>
    나는<div style="display:none;">none입니다</div> <!--숨김처리가 된다ㅏㅏㅏㅏㅏㅏㅏ-->
    나는<div style="display:inline;">inline이고</div>
    나는<div style="display:inline-block; height:50px;">inline-block입니다</div>
    <div>
        div<span style="display:block">block을 먹인 span</span>
    </div>
</body>

</html>
