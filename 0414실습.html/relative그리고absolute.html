<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
.parent {
    position: relative;
    border : 3px solid navy;
    padding: 10px;
    width: 300px;
    height: 250px;
    background-color : pink;
}
.box {
    width: 80px;
    height: 50px;
    margin: 5px;
    color: white;
    text-align: center;
    line-height: 50px;
}
.box1 {background-color: red;}
.box2 {background-color: blue;}
.box3 {background-color: yellow;}

.relative {position: relative; top: 30px; left: 40px;} /*relative로 이동시키면 기존의 위치는 남겨둔 채 자리를 이동한다. 하지만 absolute는 자리를 남기지 않고 이동한다*/
.absolute {position: absolute; top: 30px; left: 40px;}/*이건 absolute인데 fixed는 다른 창에 있음*/


</style>
</head>
<body>
<div class="container">
    <h2>position: relative 테스트</h2>
    <div class="parent">
        <div class="box box1">1번 (static)</div>
        <div class="box box2 absolute">2번 (타겟)</div>
        <div class="box box3">3번 (static)</div>
    </div>
</div>
</body>
</html>
