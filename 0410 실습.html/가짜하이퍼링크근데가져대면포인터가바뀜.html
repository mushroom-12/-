<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        span {color: blue;
        text-decoration: underline;
        cursor:pointer;}   /*포인터 바꾸기*/
        p{
        box-shadow:3px 3px 6px black,
        0 5px 25px blue,           /*x축, y축, 그림자 번짐 정도*/
        0 6px 40px yellowgreen;
        }
    </style>
</head>
<body>
    <p>전국민 교육가 지원금 300만원 <span>http://www.placecats.com</span><br>선찬순 200명</p> <!--이건 생긴건 링크인데 링크 기능 못함-->
</body>
</html>
