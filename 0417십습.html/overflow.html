<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>overflow라는게뭐죠도대체</title>
<style>
    p {font-size: 48px;
        width:240px;
        height:100px;
        border:6px solid black;}
</style>
</head>
<body>
<p style="overflow: hidden;">오늘은금요일이고날씨도안좋은데요</p> <!--탑색기에서봐보면 무슨 말인지 암 이거 진짜임-->
<br><br><br><br>
<p style="overflow:visible;">1교시만하고마쳐주셨으면합니다</p>
<br><br><br><br>
<p style="overflow:scroll">김00올림(내가한말아님)</p>
</body>
</html>
