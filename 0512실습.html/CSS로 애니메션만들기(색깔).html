<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @keyframes TCA{
            0%{color:blue;}
            20%{color:yellow;}
            40%{color:red;}
            60%{color:green;}
            80%{color:brown;}
            100%{color:cyan;}
            }
            span{
                animation-name:TCA;
                animation-duration:10s;
                animation-iteration-count:infinite;
            }
    </style>
</head>
<body>
    <p style="font-size: 300px"><span>span</span>이라는 텍스트의 색변화를 무한반복합니다</p>
</body>
</html>
