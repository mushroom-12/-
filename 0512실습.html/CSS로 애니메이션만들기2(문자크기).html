<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @keyframes BIG{
            0%{font-size:500%;}
            50%{font-size:50%;}
            100%{font-size:500%;}
        }
        span{
        animation-name:BIG;
        animation-duration:3s;
        animation-iteration-count:infinite;
        }
    </style>
</head>
<body>
    <p style="font-size: 100px"><span>BIG</span>이라는 텍스트의 크기변화를 무한반복합니다</p>
</body>
</html>
