<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h3 {text-align:center;}
        span{text-decoration: line-through;}
        strong{text-decoration: overline;}
        .p1{text-indent: 3em;
            text-align: justify;}

        .p2{text-indent: 1em;
            text-align: center;}
    </style>
</head>
<body>
    <h3>text태그</h3>
    <p class="p1">
        여기서 연습하는건<span>텍스트 제어</span></p>
    <p class="p2">
        여기서<strong>스타일 시트</strong>연습

    </p>
    <a href="http://www.google.com"
            style="text-decoration:none">
        밑줄없는 링크(구글)</a>
</body>
</html>
